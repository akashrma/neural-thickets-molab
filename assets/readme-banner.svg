<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">Neural Thickets paper explainer</title>
  <desc id="desc">A banner for the Neural Thickets notebook, with paper information and an abstract thicket of nearby task experts around pretrained weights.</desc>
  <defs>
    <radialGradient id="nt-bg-glow" cx="68%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#dcfce7" stop-opacity="0.62"/>
      <stop offset="82%" stop-color="#fed7aa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nt-thicket-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="38%" stop-color="#bfdbfe" stop-opacity="0.82"/>
      <stop offset="68%" stop-color="#bbf7d0" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#fed7aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nt-point-blue" cx="38%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.96"/>
    </radialGradient>
    <radialGradient id="nt-point-green" cx="38%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.96"/>
    </radialGradient>
    <radialGradient id="nt-point-peach" cx="38%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="nt-point-pink" cx="38%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.92"/>
    </radialGradient>
    <filter id="nt-card-shadow" x="-10%" y="-16%" width="120%" height="132%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <filter id="nt-soft-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="nt-star-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1100" height="360" rx="18" fill="#ffffff"/>
  <rect x="1" y="1" width="1098" height="358" rx="17" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="760" cy="155" r="360" fill="url(#nt-bg-glow)"/>

  <g transform="translate(48 52)">
    <rect x="0" y="0" width="134" height="34" rx="17" fill="#f0f9ff" stroke="#bae6fd"/>
    <text x="67" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#0369a1" letter-spacing="0.6">PAPER EXPLAINER</text>

    <text x="0" y="86" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="850" fill="#111827">Neural Thickets</text>

    <text font-family="Inter, Arial, sans-serif" font-size="20" fill="#374151">
      <tspan x="0" y="130">What if pretraining does more than initialize a model? This notebook explores the</tspan>
      <tspan x="0" y="159">paper's claim that many task-specialized experts can live densely near pretrained</tspan>
      <tspan x="0" y="188">weights, making random local perturbations a plausible post-training strategy.</tspan>
    </text>

    <text font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">
      <tspan x="0" y="235">Submission for the </tspan>
      <tspan fill="#2563eb" font-weight="750">molab Notebook Competition</tspan>
    </text>
    <text font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">
      <tspan x="0" y="263">Notebook by </tspan>
      <tspan fill="#111827" font-weight="800">Akash Sharma</tspan>
      <tspan> &#183; </tspan>
      <tspan fill="#2563eb" font-weight="750">X</tspan>
      <tspan> &#183; </tspan>
      <tspan fill="#2563eb" font-weight="750">GitHub</tspan>
    </text>
  </g>

  <g transform="translate(730 52)" filter="url(#nt-card-shadow)">
    <rect x="0" y="0" width="320" height="256" rx="8" fill="#ffffff" fill-opacity="0.76" stroke="#cbd5e1"/>
    <text x="18" y="31" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850" fill="#64748b" letter-spacing="0.7">ORIGINAL PAPER</text>
    <text x="18" y="66" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#111827">
      <tspan x="18" y="66">Diverse Task Experts Are</tspan>
      <tspan x="18" y="90">Dense Around Pretrained</tspan>
      <tspan x="18" y="114">Weights</tspan>
    </text>
    <text x="18" y="145" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Yulu Gan &#183; Phillip Isola</text>
    <text x="18" y="172" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="750" fill="#2563eb">alphaxiv:2603.12228</text>

    <g transform="translate(18 190) scale(0.8875)">
      <rect x="0" y="0" width="320" height="62" rx="8" fill="#f8fafc"/>
      <circle cx="160" cy="31" r="82" fill="url(#nt-thicket-glow)"/>
      <g filter="url(#nt-soft-blur)">
        <circle cx="108" cy="10" r="12" fill="#93c5fd" opacity="0.24"/>
        <circle cx="219" cy="12" r="16" fill="#86efac" opacity="0.24"/>
        <circle cx="105" cy="56" r="15" fill="#fdba74" opacity="0.22"/>
        <circle cx="225" cy="56" r="13" fill="#f9a8d4" opacity="0.24"/>
      </g>
      <g stroke="#ffffff" stroke-width="1.4">
        <circle cx="120" cy="18" r="4.8" fill="url(#nt-point-blue)"/>
        <circle cx="139" cy="8" r="3.4" fill="url(#nt-point-green)" opacity="0.88"/>
        <circle cx="184" cy="9" r="4.6" fill="url(#nt-point-peach)"/>
        <circle cx="210" cy="22" r="3.7" fill="url(#nt-point-pink)" opacity="0.9"/>
        <circle cx="132" cy="48" r="4.4" fill="url(#nt-point-peach)"/>
        <circle cx="188" cy="51" r="4.2" fill="url(#nt-point-blue)" opacity="0.9"/>
        <circle cx="219" cy="44" r="3.2" fill="url(#nt-point-green)" opacity="0.84"/>
        <circle cx="100" cy="35" r="3.5" fill="url(#nt-point-pink)" opacity="0.82"/>
        <circle cx="151" cy="58" r="3.1" fill="url(#nt-point-green)" opacity="0.78"/>
        <circle cx="231" cy="9" r="2.8" fill="url(#nt-point-blue)" opacity="0.74"/>
        <circle cx="91" cy="15" r="2.7" fill="url(#nt-point-green)" opacity="0.72"/>
        <circle cx="244" cy="32" r="2.5" fill="url(#nt-point-peach)" opacity="0.7"/>
      </g>
      <path d="M160 20.5 L163 27.3 L170.4 28.1 L164.8 33.1 L166.4 40.4 L160 36.7 L153.6 40.4 L155.2 33.1 L149.6 28.1 L157 27.3 Z" fill="#111827" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" filter="url(#nt-star-shadow)"/>
    </g>
  </g>
</svg>
